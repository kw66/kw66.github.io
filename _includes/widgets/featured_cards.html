{% assign items = include.items %}
<div class="featured-work-list my-1">
    <h4 class="featured-work-list-title mb-3">{{ include.title }}</h4>
    {% for item in items %}
    <div class="row no-gutters featured-work-entry {% unless forloop.last %}border-bottom border-gray{% endunless %}">
        <div class="col-lg-4 col-md-5 pr-md-3 pb-2 pb-md-0">
            <a class="featured-work-image-wrap" target="_blank" rel="noopener noreferrer" href="{{ item.link_url }}">
                <img src="{{ item.image | relative_url }}" alt="{{ item.name }}" class="featured-work-image" loading="lazy">
            </a>
        </div>
        <div class="col-lg-8 col-md-7 d-flex">
            <div class="featured-work-content my-auto">
                <h5 class="mt-0 mb-2 font-weight-normal">{{ item.name }}</h5>
                {% if item.meta_label and item.meta_value %}
                <p class="small mb-2 featured-work-meta">
                    <span class="font-weight-bold">{{ item.meta_label }}:</span> {{ item.meta_value }}
                </p>
                {% endif %}
                <p class="small mb-0 featured-work-links">
                    <a target="_blank" rel="noopener noreferrer" href="{{ item.link_url }}">[{{ item.link_label }}]</a>
                </p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

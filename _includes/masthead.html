<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--button masthead__menu-home-item masthead__menu-item--view" data-home-view-target="home"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
          <li class="masthead__menu-item masthead__menu-item--stats">
            <span class="masthead__stats" aria-label="Visitor statistics">
              <span class="masthead__stat" id="local_counter_container_uv" title="Unique devices">
                &#128064; <span id="local_counter_value_uv" data-counter-role="uv">--</span>
              </span>
              <span class="masthead__stat" id="local_counter_container_pv" title="Page visits">
                &#128433;&#65039; <span id="local_counter_value_pv" data-counter-role="pv">--</span>
              </span>
            </span>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>
<script>
  (function () {
    const viewTargets = Array.from(document.querySelectorAll('[data-home-view-target]'));
    let mastheadScaleRaf = 0;

    function getUvTargets() {
      return Array.from(document.querySelectorAll('[data-counter-role="uv"]'));
    }

    function getPvTargets() {
      return Array.from(document.querySelectorAll('[data-counter-role="pv"]'));
    }

    function getCurrentHomeView() {
      const path = window.location.pathname || '/';
      const normalizedPath = path === '/index.html' ? '/' : path;
      return normalizedPath === '/' ? 'home' : '';
    }

    function applyHomeViewState(view) {
      if (document.body) {
        document.body.dataset.homeView = view || '';
      }
      viewTargets.forEach((item) => {
        item.classList.toggle('is-active', item.dataset.homeViewTarget === view);
      });
    }

    function getViewportWidth() {
      if (window.visualViewport && typeof window.visualViewport.width === 'number') {
        return window.visualViewport.width;
      }
      return window.innerWidth || document.documentElement.clientWidth || 1280;
    }

    function applyMastheadScale() {
      const navList = document.querySelector('#site-nav .visible-links');
      if (!navList) return;

      const currentScale = Number.parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue('--masthead-scale')
      ) || 1;

      let naturalWidth = 0;
      Array.from(navList.children).forEach((item) => {
        const rect = item.getBoundingClientRect();
        const styles = getComputedStyle(item);
        naturalWidth += rect.width / currentScale;
        naturalWidth += (Number.parseFloat(styles.marginLeft) || 0) / currentScale;
        naturalWidth += (Number.parseFloat(styles.marginRight) || 0) / currentScale;
      });

      const availableWidth = Math.max(getViewportWidth() - 20, 320);
      const nextScale = Math.min(1, Math.max(0.52, availableWidth / Math.max(naturalWidth + 10, 1)));
      document.documentElement.style.setProperty('--masthead-scale', nextScale.toFixed(4));
    }

    function scheduleMastheadScale() {
      if (mastheadScaleRaf) {
        window.cancelAnimationFrame(mastheadScaleRaf);
      }
      mastheadScaleRaf = window.requestAnimationFrame(() => {
        mastheadScaleRaf = 0;
        applyMastheadScale();
      });
    }

    window.updateMastheadViewState = function updateMastheadViewState(view) {
      applyHomeViewState(view || getCurrentHomeView());
      scheduleMastheadScale();
    };

    applyHomeViewState(getCurrentHomeView());
    scheduleMastheadScale();

    window.addEventListener('resize', scheduleMastheadScale, { passive: true });
    window.addEventListener('pageshow', scheduleMastheadScale);
    window.addEventListener('load', scheduleMastheadScale);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', scheduleMastheadScale, { passive: true });
    }

    const statsKeys = {
      visitorSeen: 'kw66_home_visitor_seen_v2',
      snapshot: 'kw66_home_counter_snapshot_v1',
      totalUv: 'kw66_home_uv_total',
      totalPv: 'kw66_home_pv_total'
    };
    const statsApi = {
      url: 'https://ypefmpeekfucmarbbdov.supabase.co',
      anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZWZtcGVla2Z1Y21hcmJiZG92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NTA2NTYsImV4cCI6MjA4MTUyNjY1Nn0.XTOQNFuuwfu9nwDTnO9-NEqlzZnzdCVnEmYEJh0rXf8'
    };

    function parseCount(value) {
      const parsed = Number.parseInt(value || '0', 10);
      return Number.isFinite(parsed) && parsed >= 0 ? parsed : 0;
    }

    function renderCounts(uv, pv) {
      getUvTargets().forEach((el) => {
        el.textContent = String(uv);
      });
      getPvTargets().forEach((el) => {
        el.textContent = String(pv);
      });
    }

    function renderSnapshotIfAvailable() {
      const snapshot = readSnapshot();
      if (snapshot) {
        renderCounts(snapshot.uv, snapshot.pv);
      }
    }

    function readSnapshot() {
      try {
        const snapshot = window.localStorage.getItem(statsKeys.snapshot);
        if (!snapshot) return null;
        const parsed = JSON.parse(snapshot);
        return {
          uv: parseCount(parsed && parsed.uv),
          pv: parseCount(parsed && parsed.pv)
        };
      } catch (error) {
        return null;
      }
    }

    function writeSnapshot(uv, pv) {
      try {
        window.localStorage.setItem(statsKeys.snapshot, JSON.stringify({ uv, pv }));
      } catch (error) {
        // ignore storage failures
      }
    }

    async function postStatsRpc(endpoint, payload) {
      const response = await window.fetch(`${statsApi.url}/rest/v1/rpc/${endpoint}`, {
        method: 'POST',
        headers: {
          apikey: statsApi.anonKey,
          Authorization: `Bearer ${statsApi.anonKey}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error(`stats rpc ${endpoint} failed with status ${response.status}`);
      }

      const text = await response.text();
      return text ? JSON.parse(text) : null;
    }

    async function incrementCounter(counterId) {
      return postStatsRpc('increment_counter', { counter_id: counterId });
    }

    async function fetchCounters(counterIds) {
      const rows = await postStatsRpc('get_counters', { counter_ids: counterIds });
      const map = Object.create(null);
      if (Array.isArray(rows)) {
        rows.forEach((row) => {
          if (!row || !row.id) return;
          map[row.id] = parseCount(row.count);
        });
      }
      return map;
    }

    async function refreshSharedCounts() {
      const path = window.location.pathname || '/';
      const normalizedPath = path === '/index.html' ? '/' : path;
      const shouldRecordVisit = normalizedPath === '/';

      const snapshot = readSnapshot();
      if (snapshot) {
        renderCounts(snapshot.uv, snapshot.pv);
      }

      try {
        if (shouldRecordVisit) {
          await incrementCounter(statsKeys.totalPv);

          if (!window.localStorage.getItem(statsKeys.visitorSeen)) {
            await incrementCounter(statsKeys.totalUv);
            try {
              window.localStorage.setItem(statsKeys.visitorSeen, 'true');
            } catch (error) {
              // ignore storage failures
            }
          }
        }

        const counterMap = await fetchCounters([statsKeys.totalUv, statsKeys.totalPv]);
        const totalUv = parseCount(counterMap[statsKeys.totalUv]);
        const totalPv = parseCount(counterMap[statsKeys.totalPv]);
        renderCounts(totalUv, totalPv);
        writeSnapshot(totalUv, totalPv);
      } catch (error) {
        if (snapshot) {
          renderCounts(snapshot.uv, snapshot.pv);
        } else {
          renderCounts('--', '--');
        }
      }
    }

    window.addEventListener('DOMContentLoaded', renderSnapshotIfAvailable);
    window.addEventListener('load', renderSnapshotIfAvailable);
    window.addEventListener('pageshow', renderSnapshotIfAvailable);

    refreshSharedCounts();
  })();
</script>

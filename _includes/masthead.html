<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--button masthead__menu-home-item masthead__menu-item--view" data-home-view-target="home"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></li>
          <li class="masthead__menu-item masthead__menu-item--button masthead__menu-item--slot masthead__menu-item--view" data-home-view-target="slot"><a href="{{ '/' | relative_url }}?view=slot">&#32769;&#34382;&#26426;</a></li>
          <li class="masthead__menu-item masthead__menu-item--button masthead__menu-item--linkup masthead__menu-item--view" data-home-view-target="linkup"><a href="{{ '/' | relative_url }}?view=linkup">&#36830;&#36830;&#30475;</a></li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
          <li class="masthead__menu-item masthead__menu-item--stats">
            <span class="masthead__stats" aria-label="Visitor statistics">
              <span class="masthead__stat" id="local_counter_container_uv" title="Local unique devices">
                &#128064; <span id="local_counter_value_uv">--</span>
              </span>
              <span class="masthead__stat" id="local_counter_container_pv" title="Local visits">
                &#128433;&#65039; <span id="local_counter_value_pv">--</span>
              </span>
            </span>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>
<script>
  (function () {
    const uvEl = document.getElementById('local_counter_value_uv');
    const pvEl = document.getElementById('local_counter_value_pv');
    const viewTargets = Array.from(document.querySelectorAll('[data-home-view-target]'));
    let mastheadScaleRaf = 0;

    function getCurrentHomeView() {
      const path = window.location.pathname || '/';
      const normalizedPath = path === '/index.html' ? '/' : path;
      if (normalizedPath !== '/') {
        return '';
      }
      const params = new URLSearchParams(window.location.search);
      const view = params.get('view');
      if (view === 'slot' || view === 'linkup') {
        return view;
      }
      return 'home';
    }

    function applyHomeViewState(view) {
      if (document.body) {
        document.body.dataset.homeView = view || '';
      }
      viewTargets.forEach((item) => {
        item.classList.toggle('is-active', item.dataset.homeViewTarget === view);
      });
    }

    function getViewportWidth() {
      if (window.visualViewport && typeof window.visualViewport.width === 'number') {
        return window.visualViewport.width;
      }
      return window.innerWidth || document.documentElement.clientWidth || 1280;
    }

    function applyMastheadScale() {
      const navList = document.querySelector('#site-nav .visible-links');
      if (!navList) return;

      const currentScale = Number.parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue('--masthead-scale')
      ) || 1;

      let naturalWidth = 0;
      Array.from(navList.children).forEach((item) => {
        const rect = item.getBoundingClientRect();
        const styles = getComputedStyle(item);
        naturalWidth += rect.width / currentScale;
        naturalWidth += (Number.parseFloat(styles.marginLeft) || 0) / currentScale;
        naturalWidth += (Number.parseFloat(styles.marginRight) || 0) / currentScale;
      });

      const availableWidth = Math.max(getViewportWidth() - 20, 320);
      const nextScale = Math.min(1, Math.max(0.52, availableWidth / Math.max(naturalWidth + 10, 1)));
      document.documentElement.style.setProperty('--masthead-scale', nextScale.toFixed(4));
    }

    function scheduleMastheadScale() {
      if (mastheadScaleRaf) {
        window.cancelAnimationFrame(mastheadScaleRaf);
      }
      mastheadScaleRaf = window.requestAnimationFrame(() => {
        mastheadScaleRaf = 0;
        applyMastheadScale();
      });
    }

    window.updateMastheadViewState = function updateMastheadViewState(view) {
      applyHomeViewState(view || getCurrentHomeView());
      scheduleMastheadScale();
    };

    applyHomeViewState(getCurrentHomeView());
    scheduleMastheadScale();

    window.addEventListener('resize', scheduleMastheadScale, { passive: true });
    window.addEventListener('pageshow', scheduleMastheadScale);
    window.addEventListener('load', scheduleMastheadScale);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', scheduleMastheadScale, { passive: true });
    }

    if (!uvEl || !pvEl) return;

    const statsKeys = {
      visitorSeen: 'kw66_home_visitor_seen_v1',
      totalUv: 'kw66_home_total_uv_v1',
      totalPv: 'kw66_home_total_pv_v1'
    };

    function parseCount(value) {
      const parsed = Number.parseInt(value || '0', 10);
      return Number.isFinite(parsed) && parsed >= 0 ? parsed : 0;
    }

    function renderCounts(uv, pv) {
      uvEl.textContent = String(uv);
      pvEl.textContent = String(pv);
    }

    try {
      const path = window.location.pathname || '/';
      const normalizedPath = path === '/index.html' ? '/' : path;
      let totalUv = parseCount(window.localStorage.getItem(statsKeys.totalUv));
      let totalPv = parseCount(window.localStorage.getItem(statsKeys.totalPv));

      if (normalizedPath === '/') {
        totalPv += 1;
        window.localStorage.setItem(statsKeys.totalPv, String(totalPv));

        if (!window.localStorage.getItem(statsKeys.visitorSeen)) {
          totalUv += 1;
          window.localStorage.setItem(statsKeys.visitorSeen, 'true');
          window.localStorage.setItem(statsKeys.totalUv, String(totalUv));
        }
      }

      renderCounts(totalUv, totalPv);
    } catch (error) {
      renderCounts('--', '--');
    }
  })();
</script>
